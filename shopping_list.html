<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f9eff;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 10px 18px;
      background: #4f9eff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: #2b7de9;
    }

    .btn-add:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .stats {
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 20px;
      text-align: right;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 6px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #718096;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      border-color: #4f9eff;
      color: #4f9eff;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #f0f4f8;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f9eff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 8px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #a0aec0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      text-align: center;
      color: #e53e3e;
      font-size: 0.82rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="item-input" placeholder="아이템 입력..." maxlength="80">
      <button class="btn-add" id="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="error-msg" id="error-msg" style="display:none"></div>
    <div class="stats" id="stats"></div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="loading" id="loading">불러오는 중...</div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아이템이 없습니다</div>

    <button class="clear-btn" onclick="clearDone()">완료된 항목 삭제</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://ohepdjemfucfalgdbmiw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oZXBkamVtZnVjZmFsZ2RibWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjA3NTMsImV4cCI6MjA5MTM5Njc1M30.VcB-qdQACEKaX4D3QVYtsYF7PrVosgOpUE5I3sbVK8Y';

    const headers = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let items = [];
    let filter = 'all';

    async function api(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { ...headers, ...(options.headers || {}) }
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function loadItems() {
      document.getElementById('loading').style.display = 'block';
      try {
        items = await api('/shopping_items?order=created_at.asc');
      } catch (e) {
        showError('데이터를 불러오지 못했습니다.');
      } finally {
        document.getElementById('loading').style.display = 'none';
        render();
      }
    }

    async function addItem() {
      const input = document.getElementById('item-input');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('btn-add');
      btn.disabled = true;
      try {
        const [newItem] = await api('/shopping_items', {
          method: 'POST',
          body: JSON.stringify({ text, checked: false })
        });
        items.push(newItem);
        render();
        input.value = '';
        input.focus();
      } catch (e) {
        showError('추가에 실패했습니다.');
      } finally {
        btn.disabled = false;
      }
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newChecked = !item.checked;
      try {
        await api(`/shopping_items?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ checked: newChecked })
        });
        item.checked = newChecked;
        render();
      } catch (e) {
        showError('업데이트에 실패했습니다.');
      }
    }

    async function deleteItem(id) {
      try {
        await api(`/shopping_items?id=eq.${id}`, { method: 'DELETE' });
        items = items.filter(i => i.id !== id);
        render();
      } catch (e) {
        showError('삭제에 실패했습니다.');
      }
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.checked).map(i => i.id);
      if (!doneIds.length) return;
      try {
        await api(`/shopping_items?id=in.(${doneIds.join(',')})`, { method: 'DELETE' });
        items = items.filter(i => !i.checked);
        render();
      } catch (e) {
        showError('삭제에 실패했습니다.');
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      stats.textContent = total ? `${done} / ${total} 완료` : '';

      const visible = items.filter(i => {
        if (filter === 'active') return !i.checked;
        if (filter === 'done') return i.checked;
        return true;
      });

      list.innerHTML = '';
      if (visible.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        visible.forEach(item => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = item.checked;
          cb.onchange = () => toggleItem(item.id);

          const span = document.createElement('span');
          span.className = 'item-text';
          span.textContent = item.text;

          const del = document.createElement('button');
          del.className = 'btn-delete';
          del.textContent = '✕';
          del.title = '삭제';
          del.onclick = () => deleteItem(item.id);

          li.append(cb, span, del);
          list.appendChild(li);
        });
      }
    }

    document.getElementById('item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
